services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dolibarr_root
      MYSQL_DATABASE: dolibarr
      MYSQL_USER: dolibarr
      MYSQL_PASSWORD: dolibarr
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  dolibarr:
    image: dolibarr/dolibarr:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      DOLI_DB_HOST: db
      DOLI_DB_NAME: dolibarr
      DOLI_DB_USER: dolibarr
      DOLI_DB_PASSWORD: dolibarr
      DOLI_ADMIN_LOGIN: admin
      DOLI_ADMIN_PASSWORD: admin
      DOLI_URL_ROOT: "http://localhost:8080"
      WWW_USER_ID: 1000
      WWW_GROUP_ID: 1000
    volumes:
      - dolibarr_html:/var/www/html
      - dolibarr_docs:/var/www/documents
      - ./module:/var/www/html/custom/binloc

volumes:
  db_data:
  dolibarr_html:
  dolibarr_docs:
